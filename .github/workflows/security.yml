name: Security Scan

# --- Triggers ---------------------------------------------------------------------
# Runs on push to main, weekly schedule, and can be triggered manually
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1'    # Every Monday at 8:00 AM UTC
  workflow_dispatch:         # Allow manual trigger from GitHub Actions tab

# --- Jobs ---------------------------------------------------------------------
jobs:
  # --- Job 1: Snyk vulnerability scanning --------------------------------------
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Snyk scans for known CVEs in dependencies and code patterns
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true    # Don't fail the build on first scan setup
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Upload Snyk results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: snyk-results-${{ github.sha }}
          path: snyk-results.json
          retention-days: 30

  # --- Job 2: CodeQL semantic analysis ------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-22.04
    # CodeQL requires these permissions to upload security findings
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialise CodeQL - tells it we're scanning C/C++ code
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-extended   # Use extended security query pack

      # Install compiler so CodeQL can trace the build
      - name: Install ARM GCC for CodeQL build tracing
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-none-eabi cmake

      # Build the firmware — CodeQL traces this build to understand the code
      - name: Build firmware for CodeQL
        run: |
          cmake -B build -S . \
                -DCMAKE_TOOLCHAIN_FILE=cmake/arm-gcc-toolchain.cmake
          cmake --build build

      # Run CodeQL analysis and upload results to GitHub Security tab
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"

# wokwi.toml - Wokwi Simulator Project Configuration
#
# This file tells the Wokwi VS Code extension:
#   1. Which firmware binary to load into the simulated STM32
#   2. Which circuit diagram to use
#
# Usage:
#   1. Build the firmware first: cmake --build build/
#   2. Open this file in VS Code
#   3. Press F1 -> "Wokwi: Start Simulator"
#
# Documentation: https://docs.wokwi.com/vscode/project-config

[wokwi]
version = 1

# Path to the compiled firmware ELF file (relative to this file)
# The ELF is produced by: cmake --build ../../build
firmware = "../../build/ev-ecu-system.elf"

# Path to the circuit diagram
diagram  = "diagram.json"

# --- Serial Monitor ----------------------------------------------------
# Wokwi will open a serial terminal showing UART output from the STM32.
# This is where you see Teleplot data and debug logs.
[serial]
# USART1 is used for logging (PA9=TX, PA10=RX)
port = "USART1"
